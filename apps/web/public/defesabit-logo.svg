<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>DefesaBit — Logo Final</title>
<desc>Logo final DefesaBit: agente robô com engrenagens no centro do fluxo usuário → agente → dashboard → resposta</desc>

<rect x="0" y="0" width="680" height="340" rx="20" fill="#020b10"/>
<rect x="0" y="0" width="680" height="340" rx="20" fill="none" stroke="#06b6d4" stroke-width="1.4"/>

<!-- Usuário -->
<circle cx="72" cy="148" r="26" fill="#051820" stroke="#06b6d4" stroke-width="1.2"/>
<circle cx="72" cy="137" r="10" fill="#06b6d4" opacity="0.7"/>
<path d="M52,162 Q72,148 92,162" fill="#051820" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round"/>

<!-- seta usuário → agente -->
<line x1="100" y1="148" x2="136" y2="148" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3"/>
<polygon points="136,144 144,148 136,152" fill="#06b6d4"/>

<!-- Engrenagem grande -->

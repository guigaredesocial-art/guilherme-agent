  <rect x="-6" y="-64" width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <rect x="-6" y="50"  width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <rect x="-64" y="-6" width="14" height="12" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <rect x="50"  y="-6" width="14" height="12" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <rect x="27" y="-56" width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(45,33,-49)"/>
  <rect x="-39" y="-56" width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(-45,-33,-49)"/>
  <rect x="27"  y="42"  width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(-45,33,49)"/>
  <rect x="-39" y="42"  width="12" height="14" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(45,-33,49)"/>
</g>

<!-- Engrenagem pequena -->
<g transform="translate(270,102)">
  <circle cx="0" cy="0" r="22" fill="#130928" stroke="#a78bfa" stroke-width="1.2"/>
  <circle cx="0" cy="0" r="8"  fill="#020b10" stroke="#a78bfa" stroke-width="1"/>
  <rect x="-4" y="-27" width="8" height="10" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="-4" y="17"  width="8" height="10" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="-27" y="-4" width="10" height="8" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="17"  y="-4" width="10" height="8" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
</g>

<!-- Robô -->
<rect x="192" y="90" width="48" height="40" rx="10" fill="#130928" stroke="#06b6d4" stroke-width="1.5"/>
<rect x="200" y="103" width="12" height="9" rx="2.5" fill="#06b6d4"/>
<rect x="220" y="103" width="12" height="9" rx="2.5" fill="#a78bfa" opacity="0.8"/>
<line x1="216" y1="90" x2="216" y2="78" stroke="#06b6d4" stroke-width="1.6"/>
<circle cx="216" cy="76" r="4" fill="#06b6d4"/>
<rect x="207" y="130" width="18" height="10" rx="3" fill="#130928" stroke="#06b6d4" stroke-width="1"/>

<svg width="200" height="200" viewBox="0 0 200 200" role="img" xmlns="http://www.w3.org/2000/svg">
<title>DefesaBit — Ícone</title>
<desc>Ícone DefesaBit: robô agente inteligente com engrenagens</desc>

<!-- Fundo quadrado arredondado (estilo app) -->
<rect x="0" y="0" width="200" height="200" rx="44" fill="#020b10"/>
<rect x="0" y="0" width="200" height="200" rx="44" fill="none" stroke="#06b6d4" stroke-width="2"/>

<!-- Engrenagem grande de fundo -->
<g transform="translate(100,105)">
  <circle cx="0" cy="0" r="62" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <circle cx="0" cy="0" r="46" fill="#130928" stroke="#a78bfa" stroke-width="1.6"/>
  <circle cx="0" cy="0" r="17" fill="#020b10" stroke="#a78bfa" stroke-width="1.3"/>
  <rect x="-7" y="-68" width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1.1" opacity="0.75"/>
  <rect x="-7" y="52"  width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1.1" opacity="0.75"/>
  <rect x="-68" y="-7" width="16" height="14" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1.1" opacity="0.75"/>
  <rect x="52"  y="-7" width="16" height="14" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1.1" opacity="0.75"/>
  <rect x="28" y="-62" width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(45,35,-54)"/>
  <rect x="-42" y="-62" width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(-45,-35,-54)"/>
  <rect x="28"  y="46"  width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(-45,35,54)"/>
  <rect x="-42" y="46"  width="14" height="16" rx="3" fill="#130928" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(45,-35,54)"/>
</g>

<!-- Engrenagem pequena acoplada -->
<g transform="translate(152,56)">
  <circle cx="0" cy="0" r="22" fill="#130928" stroke="#a78bfa" stroke-width="1.3"/>
  <circle cx="0" cy="0" r="8"  fill="#020b10" stroke="#a78bfa" stroke-width="1"/>
  <rect x="-4" y="-27" width="8" height="10" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="-4" y="17"  width="8" height="10" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="-27" y="-4" width="10" height="8" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
  <rect x="17"  y="-4" width="10" height="8" rx="2" fill="#130928" stroke="#a78bfa" stroke-width="0.8" opacity="0.7"/>
</g>

<!-- Robô -->
<!-- cabeça -->
<rect x="72" y="38" width="56" height="46" rx="12" fill="#130928" stroke="#06b6d4" stroke-width="1.8"/>
<!-- olhos -->
<rect x="81" y="53" width="14" height="11" rx="3" fill="#06b6d4"/>
<rect x="105" y="53" width="14" height="11" rx="3" fill="#a78bfa" opacity="0.85"/>
<!-- antena -->
<line x1="100" y1="38" x2="100" y2="24" stroke="#06b6d4" stroke-width="2"/>
<circle cx="100" cy="21" r="5" fill="#06b6d4"/>
<!-- boca/sorriso -->
<path d="M86,74 Q100,82 114,74" fill="none" stroke="#06b6d4" stroke-width="1.4" stroke-linecap="round"/>
<!-- pescoço -->
<rect x="90" y="84" width="20" height="12" rx="4" fill="#130928" stroke="#06b6d4" stroke-width="1.2"/>
<!-- corpo -->
<rect x="64" y="96" width="72" height="56" rx="12" fill="#130928" stroke="#06b6d4" stroke-width="1.8"/>
<!-- painel peito -->
<rect x="76" y="107" width="48" height="30" rx="5" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.9"/>
<!-- batimento no painel -->
<polyline points="79,123 86,112 93,130 100,118 107,123 114,123 121,123" fill="none" stroke="#06b6d4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
<!-- braços -->
<line x1="64" y1="112" x2="48" y2="116" stroke="#06b6d4" stroke-width="6" stroke-linecap="round"/>
<line x1="48" y1="116" x2="44" y2="108" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
<line x1="136" y1="112" x2="154" y2="108" stroke="#06b6d4" stroke-width="6" stroke-linecap="round"/>
<!-- pernas -->
<rect x="78" y="152" width="18" height="28" rx="6" fill="#130928" stroke="#06b6d4" stroke-width="1.4"/>
<rect x="104" y="152" width="18" height="28" rx="6" fill="#130928" stroke="#06b6d4" stroke-width="1.4"/>

<!-- "DB" discreto no rodapé -->
<text x="100" y="194" font-family="monospace" font-size="10" font-weight="700" fill="#06b6d4" text-anchor="middle" opacity="0.6">DefesaBit</text>
</svg>
